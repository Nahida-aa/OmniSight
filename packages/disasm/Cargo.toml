[package]
name = "omnisight-disasm"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "disasm"
path = "src/main.rs"

[dependencies]
omnisight-shared = { path = "../shared" }

zip = "2"
goblin = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
indicatif = "0.17"
log = "0.4"
env_logger = "0.11"
regex = "1"
