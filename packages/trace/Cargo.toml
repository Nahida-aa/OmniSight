[package]
name = "omnisight-trace"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "trace"
path = "src/main.rs"

[dependencies]
omnisight-shared = { path = "../shared" }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
chrono = "0.4"
